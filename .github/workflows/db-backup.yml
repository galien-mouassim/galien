name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'   # Every day at 2:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DB_BACKUP_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" --no-owner --no-acl --format=plain > backup.sql
          echo "Dump size: $(du -sh backup.sql | cut -f1)"

      - name: Push backup to repository
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
          BACKUP_REPO: ${{ secrets.BACKUP_REPO }}
        run: |
          DATE=$(date +%Y-%m-%d)
          REPO_URL="https://x-access-token:${BACKUP_TOKEN}@github.com/${BACKUP_REPO}.git"

          # Clone existing repo or init a new one if empty
          if git clone "$REPO_URL" backup-repo 2>/dev/null; then
            echo "Cloned existing repo"
          else
            echo "Initializing new empty repo"
            mkdir -p backup-repo
            cd backup-repo
            git init
            git remote add origin "$REPO_URL"
            cd ..
          fi

          cp backup.sql "backup-repo/backup_${DATE}.sql"
          cd backup-repo

          # Keep only the last 30 backups
          ls -t backup_*.sql 2>/dev/null | tail -n +31 | xargs -r rm -f

          git config user.email "backup-bot@galien.app"
          git config user.name "Galien Backup Bot"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Backup ${DATE}"
            git push origin HEAD:main 2>/dev/null || git push --set-upstream origin main
          fi
